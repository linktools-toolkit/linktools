requires-python: ">=3.10"

# Core dependencies stay lightweight: FileStorage, Store Protocols, Provider
# Protocols, and the Capability Runtime need only pydantic-ai + the linktools
# core. SQLAlchemy/aiosqlite are optional -- install via the
# sqlite/sqlalchemy/postgres/mysql extras when using SqlAlchemyStorage.
dependencies:
  - pydantic-ai-slim[mcp,openai]>=1.107,<2
  - linktools>=0.9.0
  - jsonschema>=4,<5

dev-dependencies:
  - pytest-asyncio
  - sqlalchemy[asyncio]>=2.0,<3
  - aiosqlite>=0.20,<1
  - lupa>=2,<3

release-dependencies: []

optional-dependencies:
  sqlalchemy:
    - sqlalchemy[asyncio]>=2.0,<3
  sqlite:
    - sqlalchemy[asyncio]>=2.0,<3
    - aiosqlite>=0.20,<1
  postgres:
    - sqlalchemy[asyncio]>=2.0,<3
    - asyncpg>=0.29,<1
  mysql:
    - sqlalchemy[asyncio]>=2.0,<3
    - asyncmy>=0.2,<1
  tui:
    - textual
  # test extra: lets a downstream party install the built wheel + the public
  # storage testing testkit + pytest, then run the external-adapter conformance
  # suite WITHOUT the source tree (plan §7.2 line 1852).
  test:
    - pytest
    - pytest-asyncio
  all:
    - sqlalchemy[asyncio]>=2.0,<3
    - aiosqlite>=0.20,<1
    - asyncpg>=0.29,<1
    - asyncmy>=0.2,<1
