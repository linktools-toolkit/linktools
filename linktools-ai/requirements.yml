requires-python: ">=3.10"

# Core dependencies stay lightweight: FileStorage, Store Protocols, Provider
# Protocols, and the Capability Runtime need only pydantic-ai + the linktools
# core. SQLAlchemy/aiosqlite are optional -- install via the sqlite or
# sqlalchemy extras when using SqlAlchemyStorage. The core wheel intentionally
# carries NO environment-specific DB driver (postgres/mysql/etc.) or external
# coordination client (redis/etcd) -- a deployment using those brings its own
# driver and injects a distributed coordinator; the core stays backend-neutral.
dependencies:
  - pydantic-ai-slim[mcp,openai]>=1.107,<2
  - linktools>=0.9.0
  - jsonschema>=4,<5

dev-dependencies:
  - pytest-asyncio
  - sqlalchemy[asyncio]>=2.0,<3
  - aiosqlite>=0.20,<1
  - lupa>=2,<3

release-dependencies: []

optional-dependencies:
  sqlalchemy:
    - sqlalchemy[asyncio]>=2.0,<3
  sqlite:
    - sqlalchemy[asyncio]>=2.0,<3
    - aiosqlite>=0.20,<1
  tui:
    - textual
  # test extra: lets a downstream party install the built wheel + pytest, copy
  # the sibling linktools-ai/conformance/ + linktools-ai/testing/ packages
  # (test-support code, not shipped in the wheel), and run the external-adapter
  # conformance suite WITHOUT the rest of the source tree.
  test:
    - pytest
    - pytest-asyncio
  all:
    - sqlalchemy[asyncio]>=2.0,<3
    - aiosqlite>=0.20,<1

