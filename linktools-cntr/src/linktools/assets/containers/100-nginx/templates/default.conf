{% if AUTH_BYPASS %}
{% for regex in AUTH_BYPASS %}
location ~* {{ regex }} {
    include /etc/nginx/conf.d/snippets/header.conf;
    set $target_url "{{ PROXY_URL }}";
    proxy_pass $target_url;
    {% include "_basic.conf" %}
}
{% endfor %}
{% endif %}

location / {
    include /etc/nginx/conf.d/snippets/header.conf;
    {% if AUTH_ENABLE %}
    include /etc/nginx/conf.d/snippets/auth.conf;
    {% if AUTH_HEADERS %}
    {% for key, vaule in AUTH_HEADERS.items() %}
    proxy_set_header {{ key }} "{{ vaule }}";
    {% endfor %}
    {% endif %}
    {% endif %}
    set $target_url "{{ PROXY_URL }}";
    proxy_pass $target_url;
    {% include "_basic.conf" %}
}
