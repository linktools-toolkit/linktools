{% if AUTH_BYPASS %}
{% for regex in AUTH_BYPASS %}
location ~* {{ regex }} {
    {% if WAF_ENABLE %}
    include /etc/nginx/conf.d/snippets/header.conf;
    {% else %}
    include /etc/nginx/conf.d/snippets/header_all.conf;
    {% endif %}
    set $target_url "{{ PROXY_URL }}";
    proxy_pass $target_url;
    {% include "_params.conf" %}
}
{% endfor %}
{% endif %}

location / {
    {% if WAF_ENABLE %}
    include /etc/nginx/conf.d/snippets/header.conf;
    {% else %}
    include /etc/nginx/conf.d/snippets/header_all.conf;
    {% endif %}
    {% if AUTH_ENABLE %}
    include /etc/nginx/conf.d/snippets/auth.conf;
    {% if AUTH_HEADERS %}
    {% for key, value in AUTH_HEADERS.items() %}
    proxy_set_header {{ key }} "{{ value }}";
    {% endfor %}
    {% endif %}
    {% endif %}
    set $target_url "{{ PROXY_URL }}";
    proxy_pass $target_url;
    {% include "_params.conf" %}
}
