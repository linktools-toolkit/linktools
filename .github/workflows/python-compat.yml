name: Python 3.6-3.10 compatibility

# Three layers, matching the git-gating support matrix:
#
#   python36-no-git    -- Python 3.6, container image (setup-python no longer
#                         ships 3.6 binaries for hosted ubuntu-latest runners,
#                         so this pins a python:3.6-slim container instead).
#                         Dulwich must NOT be installed; Core Config / cntr
#                         local-repo/non-Git functionality must work.
#   python39-degraded  -- Python 3.9, real interpreter. Dulwich must NOT be
#                         installed; Git-dependent actions degrade with a
#                         warning + non-zero/unsupported, never silently
#                         "succeed".
#   python310-full-git -- Python 3.10, real interpreter, Dulwich 0.25.x
#                         installed. Full Git clone/update/status coverage.
#
# linktools-ai (and tests/ai) requires Python >=3.10 and is never installed
# or collected by any job here -- it has its own CI path.
#
# Each job also builds real wheels and installs them into a clean venv
# (never just editable-installed), and asserts Dulwich's installed-or-absent
# state from that clean install, not just the editable dev environment.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  python36-no-git:
    runs-on: ubuntu-latest
    container:
      image: python:3.6-slim

    steps:
      - uses: actions/checkout@v4

      - name: Static Python 3.6 syntax scan
        run: python scripts/check_python36_compat.py

      - name: Install build tooling
        run: python -m pip install --upgrade "pip<22" -r requirements.txt pytest

      - name: Install linktools + linktools-cntr (editable, no AI/Git extra)
        run: python manage.py install --editable linktools linktools-cntr

      - name: Confirm Dulwich is not installed
        run: |
          python -c "
          import importlib.util
          assert importlib.util.find_spec('dulwich') is None
          "

      - name: compileall (non-AI packages)
        run: |
          python -m compileall -q \
            linktools/src \
            linktools-common/src \
            linktools-mobile/src \
            linktools-cntr/src

      - name: Import / CLI smoke test
        run: |
          python -c "
          from linktools.core import LinktoolsFileConfig, LinktoolsFileConfigLoader
          from linktools.git import is_git_available, get_git_unavailable_reason
          assert is_git_available() is False
          assert get_git_unavailable_reason()
          "
          python -m linktools --help
          python -m linktools.cntr --help
          python -m linktools.cntr repo --help
          python -m linktools.cntr status --help

      - name: Core Config / file-config tests
        run: python -m pytest tests/core -q

      - name: cntr tests (local repo / Git-unsupported paths)
        run: python -m pytest tests/cntr -q

      - name: Build wheels
        run: VERSION=0.0.0.dev0 python manage.py build linktools linktools-cntr

      - name: Install wheels into a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/python -m pip install --upgrade "pip<22"
          /tmp/wheel-venv/bin/python -m pip install dist/linktools-*.whl
          /tmp/wheel-venv/bin/python -m pip install dist/linktools_cntr-*.whl
          /tmp/wheel-venv/bin/python -c "
          import importlib.util
          assert importlib.util.find_spec('dulwich') is None
          "
          /tmp/wheel-venv/bin/python -m linktools.cntr --help

  python39-degraded:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install build tooling
        run: python -m pip install --upgrade pip -r requirements.txt pytest

      - name: Install linktools + linktools-cntr (editable, no AI extra)
        run: python manage.py install --editable linktools linktools-cntr

      - name: Confirm Dulwich is not installed
        run: |
          python -c "
          import importlib.util
          assert importlib.util.find_spec('dulwich') is None
          "

      - name: Git degradation smoke test
        run: |
          python -c "
          from linktools.git import is_git_available, get_git_unavailable_reason
          assert is_git_available() is False
          assert 'Python 3.10' in get_git_unavailable_reason()
          "

      - name: Core Config / cntr tests (Git-degraded)
        run: python -m pytest tests/core tests/cntr -q

      - name: Build wheels
        run: VERSION=0.0.0.dev0 python manage.py build linktools linktools-cntr

      - name: Install wheels into a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/wheel-venv/bin/python -m pip install dist/linktools-*.whl
          /tmp/wheel-venv/bin/python -m pip install dist/linktools_cntr-*.whl
          /tmp/wheel-venv/bin/python -c "
          import importlib.util
          assert importlib.util.find_spec('dulwich') is None
          "

  python310-full-git:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tooling
        run: python -m pip install --upgrade pip -r requirements.txt pytest

      - name: Install linktools[git] + linktools-cntr (editable)
        run: |
          python manage.py install --editable linktools linktools-cntr
          python -m pip install "dulwich>=0.25.1,<0.26"

      - name: Confirm Dulwich version
        run: |
          python -c "
          from importlib.metadata import version
          from packaging.version import Version
          v = Version(version('dulwich'))
          assert Version('0.25.1') <= v < Version('0.26'), v
          "

      - name: Full test suite (real Git clone/update/status/diverge/reset)
        run: python -m pytest tests/core tests/cntr -q

      - name: Build wheels
        run: VERSION=0.0.0.dev0 python manage.py build linktools linktools-cntr

      - name: Install wheels (with the git extra) into a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/wheel-venv/bin/python -m pip install "$(ls dist/linktools-*.whl)[git]"
          /tmp/wheel-venv/bin/python -m pip install dist/linktools_cntr-*.whl
          /tmp/wheel-venv/bin/python -c "
          from importlib.metadata import version
          from packaging.version import Version
          v = Version(version('dulwich'))
          assert Version('0.25.1') <= v < Version('0.26'), v
          "
