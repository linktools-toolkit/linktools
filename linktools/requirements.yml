dependencies:
  - importlib-metadata; python_version < '3.8'
  - filelock>=3.4.0
  - psutil

dev-dependencies:
  - pyyaml

optional-dependencies:

  # 命令行自动补全
  # Command line auto-completion
  cli:
    - rich
    - argcomplete>=2.0.0
    - 'requests[socks]'

  common:
    - linktools-common[all]

  mobile:
    - linktools-mobile[all]

  # 用于docker/podman容器管理
  # Used for docker/podman container management
  cntr:
    - linktools-cntr

  ssh:
    # 使用ssh连接越狱后的iphone
    # Use ssh to connect to jailbroken iphone
    - paramiko
    - scp

  git:
    # Used for git repository clone/pull operations
    # >=0.25.1: porcelain.switch() 在 0.25.0 引入，但 porcelain.status() 的
    # untracked 字段类型不一致，0.25.1 才修复
    # <0.26: 不自动升级到未来可能破坏 API 的版本
    - "dulwich>=0.25.1; python_version >= '3.10'"
    - "dulwich; python_version < '3.10'"