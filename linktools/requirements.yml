dependencies:
  - filelock>=3.4.0
  - importlib-metadata; python_version < '3.8'
  - psutil
  # PEP 440 version/specifier parsing for the layered file config's
  # `requires` field. packaging>=22 dropped Python 3.6/3.7 support, so this
  # stays split by python_version rather than raising this package's own
  # >=3.6 floor.
  - packaging<22; python_version < '3.8'
  - packaging; python_version >= '3.8'

dev-dependencies:
  - pyyaml

optional-dependencies:

  # 命令行自动补全
  # Command line auto-completion
  cli:
    - rich
    - argcomplete>=2.0.0
    - 'requests[socks]'

  common:
    - linktools-common[all]

  mobile:
    - linktools-mobile[all]

  # 用于docker/podman容器管理
  # Used for docker/podman container management
  cntr:
    - linktools-cntr

  ssh:
    # 使用ssh连接越狱后的iphone
    # Use ssh to connect to jailbroken iphone
    - paramiko
    - scp

  git:
    # 用于git仓库的克隆、拉取等操作
    # Used for git repository clone/pull operations
    # >=0.25.1: porcelain.switch() 在 0.25.0 引入，但 porcelain.status() 的
    # untracked 字段类型不一致，0.25.1 才修复
    - dulwich>=0.25.1
